<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Cloud - Modern UI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Quote <span>Cloud</span></h1>
            <p>Share your thoughts with the world</p>
        </header>

        <div class="input-card">
            <textarea id="quoteInput" placeholder="Write your inspiring quote here..."></textarea>
            <div class="input-row">
                <input type="text" id="authorInput" placeholder="Author Name">
                <button id="submitBtn">Post Quote</button>
            </div>
        </div> 

        <div class="feed-section">
            <h3>Recent Quotes</h3>
            <div id="quotesList" class="quotes-list">
                </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
