<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Quotes - Admin & Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="admin-box">
            <h3>Add New Quote</h3>
            <textarea id="quoteInput" placeholder="Enter your quote here..."></textarea>
            <input type="text" id="authorInput" placeholder="Enter author name">
            <button id="submitBtn">Submit to Cloud</button>
        </div>

        <hr>

        <div class="quote-box">
            <h2>"</h2>
            <p id="quote">Click the button below to fetch a quote!</p>
            <h3 id="author">- Waiting...</h3>
            <button id="fetchBtn">Get Random Quote</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
